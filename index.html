<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="An 89-question AB-900 practice exam simulator with exact source answer review."
    />
    <title>AB-900 Practice Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#" aria-label="AB-900 Practice Lab home">
        <span class="brand-mark">AB</span>
        <span>
          <strong>Practice Lab</strong>
          <small>Microsoft 365 Copilot &amp; Agent Administration</small>
        </span>
      </a>
      <div class="header-meta">
        <span class="status-dot"></span>
        89 source questions
      </div>
    </header>

    <main id="app" tabindex="-1">
      <section class="loading-screen" aria-live="polite">
        <div class="spinner"></div>
        <p>Preparing the question bank…</p>
      </section>
    </main>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

    <!-- App Logic -->
    <script src="auth.js"></script>
    <script src="db.js"></script>
    <script src="app.js"></script>
  </body>
</html>
